services:
  app:
    build: ./docker/php
    container_name: app
    volumes:
      - ./app:/var/www
    env_file:
      - ./docker/env/app.env
    depends_on:
      - pgsql
      - redis

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "8000:80"
    volumes:
      - ./app:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  pgsql:
    image: postgres:15
    container_name: pgsql
    restart: always
    environment:
      POSTGRES_DB: saas
      POSTGRES_USER: saas_user
      POSTGRES_PASSWORD: super_secure_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - "6379:6379"

  horizon:
    build: ./docker/php
    container_name: horizon
    command: php artisan horizon
    volumes:
      - ./app:/var/www
    env_file:
      - ./docker/env/app.env
    depends_on:
      - app
      - redis
      - pgsql

  scheduler:
    build: ./docker/php
    container_name: scheduler
    command: php artisan schedule:work
    volumes:
      - ./app:/var/www
    env_file:
      - ./docker/env/app.env
    depends_on:
      - app
      - redis
      - pgsql

volumes:
  pgdata: